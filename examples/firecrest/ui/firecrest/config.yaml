# FireCREST v2 API config for the slurm-emulator UI stack.
# Adapted from firecrest-v2's f7t-api-config.local-env.yaml: kept the Keycloak
# auth block (realm kcrealm), reduced to a single cluster pointed at the
# emulator (slurmrestd :6820 + SSH :22), and set api_version to 0.0.46 (what the
# emulator serves). Hosts are docker service names on the compose network.
apis_root_path: ""
doc_servers:
  - url: "http://localhost:8000"
    description: "Local environment"

auth:
  authentication:
    scopes: {}
    tokenUrl: "http://keycloak:8080/auth/realms/kcrealm/protocol/openid-connect/token"
    tokenEndpointAuthMethod: "client_secret_post"
    publicCerts:
      - "http://keycloak:8080/auth/realms/kcrealm/protocol/openid-connect/certs"
    usernameClaim: "sub"

# The emulator's SSH plane accepts any key (dev), but the API's SSHStaticKeys
# loader still needs a private key file to exist — up.sh generates one.
ssh_credentials:
  type: "SSHStaticKeys"
  keys:
    fireuser:
      private_key: "secret_file:/run/secrets/ssh_private_key_fireuser"
    # The health checker connects as the service account user (firesrv).
    # The emulator accepts any key, so reuse the same private key file.
    firesrv:
      private_key: "secret_file:/run/secrets/ssh_private_key_fireuser"

clusters:
  - name: "cluster-emulator"
    ssh:
      host: "slurm"
      port: 22
      max_clients: 100
      timeout:
        connection: 5
        login: 5
        command_execution: 10
        idle_timeout: 60
        keep_alive: 5
    scheduler:
      # hybrid: normal job ops go over slurmrestd (fast), but submit-by-path
      # (remote-file jobs) and get_job_metadata (stdout/stderr/script) fall
      # back to SSH sbatch/scontrol. Pure "rest" leaves the SSH scheduler
      # client unwired, so those two operations 501.
      type: "slurm"
      connection_mode: "hybrid"
      version: "26.11.0"
      api_url: "http://slurm:6820"
      api_version: "0.0.46"
      timeout: 10
    service_account:
      client_id: "firecrest-health-check"
      secret: "secret_file:/run/secrets/service_account_client_secret"
    probing:
      interval_check: 120
      startup_grace_period: 300
      services:
        scheduler:
          timeout: 20
        filesystem:
          timeout: 20
        ssh:
          timeout: 5
    file_systems:
      - path: "/home"
        data_type: "users"
        default_work_dir: true
    data_operation:
      max_ops_file_size: 5242880 # 5M
      datatransfer_jobs_directives:
        - "#SBATCH --nodes=1"
        - "#SBATCH --time=0-00:15:00"
      data_transfer:
        service_type: "streamer"
        host: "0.0.0.0"
        port_range: [5665, 5666]
        public_ips:
          - "localhost"
        wait_timeout: 43200
        inbound_transfer_limit: 5368709120

  # Second, independent cluster (its own emulator container / state).
  - name: "cluster-emulator-2"
    ssh:
      host: "slurm2"
      port: 22
      max_clients: 100
      timeout:
        connection: 5
        login: 5
        command_execution: 10
        idle_timeout: 60
        keep_alive: 5
    scheduler:
      type: "slurm"
      connection_mode: "hybrid"
      version: "26.11.0"
      api_url: "http://slurm2:6820"
      api_version: "0.0.46"
      timeout: 10
    service_account:
      client_id: "firecrest-health-check"
      secret: "secret_file:/run/secrets/service_account_client_secret"
    probing:
      interval_check: 120
      startup_grace_period: 300
      services:
        scheduler:
          timeout: 20
        filesystem:
          timeout: 20
        ssh:
          timeout: 5
    file_systems:
      - path: "/home"
        data_type: "users"
        default_work_dir: true
    data_operation:
      max_ops_file_size: 5242880 # 5M
      datatransfer_jobs_directives:
        - "#SBATCH --nodes=1"
        - "#SBATCH --time=0-00:15:00"
      data_transfer:
        service_type: "streamer"
        host: "0.0.0.0"
        port_range: [5665, 5666]
        public_ips:
          - "localhost"
        wait_timeout: 43200
        inbound_transfer_limit: 5368709120
