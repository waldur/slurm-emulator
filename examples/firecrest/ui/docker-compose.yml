# Full FireCREST-UI stack against the slurm-emulator.
#
#   firecrest-ui (Remix, :3000)
#        │  OIDC login (browser) ─────────────► keycloak (:8080, realm kcrealm)
#        │  bearer-forwards token (server) ───► firecrest (API, :8000->5000)
#                                                   │  slurmrestd REST ─► slurm (emulator :6820)
#                                                   │  SSH filesystem  ─► slurm (emulator :22)
#
# Launch with ./up.sh (clones firecrest-v2 for the API build, writes secrets,
# then `docker compose up`). See README.md — a `127.0.0.1 keycloak` hosts entry
# is required so the issuer URL resolves identically in the browser and in the
# UI/API containers.

# Fixed project name so the persisted volumes are stable regardless of the
# directory this compose file lives in.
name: firecrest-ui

secrets:
  service_account_client_secret:
    file: ./secrets/service_account_client_secret
  ssh_private_key_fireuser:
    file: ./secrets/ssh_private_key_fireuser

# Named volumes persist each emulator's job/accounting state and uploaded
# files across container restarts. `docker compose down -v` wipes them.
volumes:
  slurm_state:
  slurm_home:
  slurm2_state:
  slurm2_home:

services:
  # --- The cluster: slurm-emulator (slurmrestd + SSH filesystem plane) ---
  slurm:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: opennode/slurm-emulator:latest
    hostname: slurm
    environment:
      SLURM_EMULATOR_ENABLE_SSH: "1"
      SLURM_EMULATOR_SSH_PORT: "22"        # API connects to slurm:22
      SLURM_EMULATOR_FS_ROOT: "/"          # so /home/<user> resolves in-container
      SLURM_EMULATOR_JOB_CLOCK: "wall"
      SLURM_EMULATOR_JOB_RUN_DELAY: "2"
      SLURM_EMULATOR_JOB_RUN_DURATION: "8"
      # Persist accounting/job state across container restarts (see volumes).
      SLURM_EMULATOR_STATE_FILE: "/state/db.json"
      SLURM_EMULATOR_TIME_FILE: "/state/time.json"
      # Topology: debug node[001-004] + compute node[005-100] = 100 nodes.
      SLURM_EMULATOR_PARTITIONS: "debug:1-4,compute:5-100"
    volumes:
      - slurm_state:/state     # job/accounting state
      - slurm_home:/home       # uploaded files (FS_ROOT=/)
    ports:
      - "${HOST_IP:-127.0.0.1}:6820:6820"
      - "${HOST_IP:-127.0.0.1}:2222:22"
    healthcheck:
      # ping is auth-protected (mirrors real slurmrestd); send a dummy token.
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen(u.Request('http://localhost:6820/slurm/v0.0.46/ping/', headers={'X-SLURM-USER-TOKEN': 'x'}), timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 20

  # --- A second, independent cluster (own container => own state) ---
  slurm2:
    image: opennode/slurm-emulator:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
    hostname: slurm2
    environment:
      SLURM_EMULATOR_ENABLE_SSH: "1"
      SLURM_EMULATOR_SSH_PORT: "22"
      SLURM_EMULATOR_FS_ROOT: "/"
      SLURM_EMULATOR_JOB_CLOCK: "wall"
      SLURM_EMULATOR_JOB_RUN_DELAY: "2"
      SLURM_EMULATOR_JOB_RUN_DURATION: "8"
      SLURM_EMULATOR_STATE_FILE: "/state/db.json"
      SLURM_EMULATOR_TIME_FILE: "/state/time.json"
      # Deliberately different topology: gpu node[001-008] + compute
      # node[009-040] = 40 nodes, so the two clusters look distinct in the UI.
      SLURM_EMULATOR_PARTITIONS: "gpu:8,compute:32"
    volumes:
      - slurm2_state:/state
      - slurm2_home:/home
    ports:
      - "${HOST_IP:-127.0.0.1}:6821:6820"
      - "${HOST_IP:-127.0.0.1}:2223:22"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen(u.Request('http://localhost:6820/slurm/v0.0.46/ping/', headers={'X-SLURM-USER-TOKEN': 'x'}), timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 20

  # --- OIDC identity provider (realm kcrealm, user fireuser/password) ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    env_file: ./keycloak/keycloak.env
    environment:
      # Override so the issuer resolves the same from the browser (via the
      # `127.0.0.1 keycloak` hosts entry) and from the UI/API containers.
      KC_HOSTNAME: "http://keycloak:8080/auth"
    command: start-dev --http-relative-path /auth --import-realm --health-enabled=true --metrics-enabled=true
    volumes:
      - ./keycloak/realm-kcrealm.json:/opt/keycloak/data/import/config.json:ro
    ports:
      - "${HOST_IP:-127.0.0.1}:8080:8080"
      - "${HOST_IP:-127.0.0.1}:9090:9000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /auth/health/ready HTTP/1.1\r\nHost: localhost:9000\r\nConnection: close\r\n\r\n' >&3; cat <&3 | grep -q '\"status\": \"UP\"' && exit 0 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 40

  # --- One-shot: create the human login user fireuser/password ---
  keycloak-create-user:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: "no"
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:8080/auth/
        --realm master --user admin --password admin2 &&
        (/opt/keycloak/bin/kcadm.sh create users -r kcrealm -s username=fireuser -s enabled=true ||
         echo "user may already exist") &&
        /opt/keycloak/bin/kcadm.sh set-password -r kcrealm --username fireuser -p password

  # --- FireCREST v2 API (built from a firecrest-v2 checkout) ---
  firecrest:
    build:
      context: ${FIRECREST_V2_DIR:?set FIRECREST_V2_DIR to a firecrest-v2 checkout (up.sh does this)}
      dockerfile: ./build/docker/firecrest-api/Dockerfile
      args:
        ENVIRONMENT: development
    image: firecrest-v2-api:local
    environment:
      ENVIRONMENT: development
      YAML_CONFIG_FILE: "/app/config/app-config.yaml"
    secrets:
      - service_account_client_secret
      - ssh_private_key_fireuser
    volumes:
      - ./firecrest/config.yaml:/app/config/app-config.yaml:ro
    command: ["uvicorn", "firecrest.main:app", "--host", "0.0.0.0", "--port", "5000"]
    depends_on:
      keycloak:
        condition: service_healthy
      slurm:
        condition: service_healthy
      slurm2:
        condition: service_healthy
    ports:
      - "${HOST_IP:-127.0.0.1}:8000:5000"

  # --- FireCREST Web UI (Remix) ---
  firecrest-ui:
    image: ${FIRECREST_UI_IMAGE:-ghcr.io/eth-cscs/firecrest-ui:latest}
    environment:
      APP_VERSION: "local"
      ENVIRONMENT: development
      NODE_ENV: production
      SERVICE_NAME: "firecrest-web-ui"
      LOGGING_LEVEL: debug
      # Branding
      APP_NAME: "FireCREST (emulator)"
      COMPANY_NAME: "slurm-emulator"
      LOGO_PATH: "logo.svg"
      UI_HOSTNAME: "localhost:3000"
      SUPPORT_URL: "https://github.com/eth-cscs/firecrest-ui"
      DOC_URL: "https://eth-cscs.github.io/firecrest-v2/"
      REPO_URL: "https://github.com/eth-cscs/firecrest-ui"
      # API (server-side, over the compose network)
      FIRECREST_API_BASE_URL: "http://firecrest:5000"
      # OIDC (issuer must resolve from browser AND this container — see README)
      OIDC_ISSUER_URL: "http://keycloak:8080/auth/realms/kcrealm"
      OIDC_CLIENT_ID: "firecrest-web-ui"
      OIDC_CLIENT_SECRET: "UI4RiquLaPAT31WsrrKk8UllYkfnnu4t"
      OIDC_CALLBACK_URL: "http://localhost:3000/auth/callback"
      OIDC_POST_LOGOUT_REDIRECT_URL: "http://localhost:3000/"
      # Session (dev over http)
      SESSION_SECRET: "${SESSION_SECRET:-dev-session-secret}"
      SESSION_FILE_SECRET: "${SESSION_FILE_SECRET:-dev-file-secret}"
      SESSION_FILE_DIR_PATH: "./sessions"
      REDIS_ACTIVE: "false"
      COOKIE_SECURE: "false"
    depends_on:
      - firecrest
      - keycloak
    ports:
      - "${HOST_IP:-127.0.0.1}:3000:3000"
